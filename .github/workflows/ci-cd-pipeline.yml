name: Numi SaaS CI/CD Pipeline

on:
  push:
    branches: [ "main", "production" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    name: Build & Test Full System
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run AI Context & Tenant Isolation Tests
        run: |
          node src/utils/test_saas_layer.js
          node src/utils/test_production_flow.js

      - name: Run Live Class & Gamification Tests
        run: |
          node src/utils/test_live_class.js
          node src/utils/test_gamification.js

      - name: Run Final Production QA Engine
        run: |
          node src/utils/test_full_platform_audit.js

      - name: Build Frontend Assets
        run: npm run build:frontend

      - name: Run Production Deployment Engine Validation
        env:
          NODE_ENV: production
          TENANT_ENFORCEMENT_MODE: "true"
          AI_USAGE_TRACKING: "true"
          ENABLE_DEBUG: "false"
        run: node src/utils/test_production_deployment.js

  deploy:
    name: Deploy to Production
    needs: build_and_test
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Authenticate to Cloud Provider
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy Docker Stack
        run: |
          docker-compose -f docker-compose.yml build
          docker-compose -f docker-compose.yml push
          # Connect to ECS/Kubernetes cluster and rollout updates...
          echo "Deployment successful."
