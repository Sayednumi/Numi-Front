<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numi — إعداد المنظمة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a; --card: rgba(30,41,59,.85); --border: rgba(255,255,255,.08);
            --primary: #3b82f6; --success: #10b981; --text: #f8fafc; --muted: #94a3b8;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        body { background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center;
            background-image:radial-gradient(at 20% 20%,rgba(59,130,246,.12) 0,transparent 50%); }

        .container { width:100%; max-width:640px; padding:2rem 1.5rem; }

        /* Progress */
        .progress-bar { display:flex; gap:.5rem; margin-bottom:2.5rem; }
        .step-dot { flex:1; height:4px; border-radius:4px; background:rgba(255,255,255,.1); transition:background .4s; }
        .step-dot.done { background:var(--success); }
        .step-dot.active { background:var(--primary); }

        /* Card */
        .wizard-card { background:var(--card); border:1px solid var(--border); border-radius:1.25rem;
            padding:2.5rem 2rem; backdrop-filter:blur(12px); }
        .step-icon { font-size:2.5rem; margin-bottom:1rem; }
        .step-title { font-size:1.5rem; font-weight:800; margin-bottom:.4rem; }
        .step-sub { color:var(--muted); font-size:.9rem; margin-bottom:2rem; line-height:1.6; }

        /* Form */
        .form-group { margin-bottom:1.25rem; }
        label { display:block; font-size:.85rem; font-weight:700; color:var(--muted); margin-bottom:.45rem; }
        input, select {
            width:100%; padding:.75rem 1rem; background:rgba(255,255,255,.05);
            border:1px solid var(--border); border-radius:.75rem; color:var(--text);
            font-family:inherit; font-size:.95rem; transition:border .2s;
        }
        input:focus, select:focus { outline:none; border-color:var(--primary); background:rgba(59,130,246,.05); }
        select option { background:#1e293b; }

        /* Feature toggles */
        .feature-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
        .feature-toggle { background:rgba(255,255,255,.04); border:1px solid var(--border);
            border-radius:.75rem; padding:1rem; cursor:pointer; transition:all .2s; }
        .feature-toggle.on { border-color:rgba(59,130,246,.4); background:rgba(59,130,246,.08); }
        .feature-toggle i { font-size:1.3rem; margin-bottom:.5rem; display:block; }
        .feature-toggle span { font-size:.85rem; font-weight:700; }

        /* Buttons */
        .btn-row { display:flex; gap:.75rem; margin-top:1.75rem; }
        .btn { flex:1; padding:.8rem 1.5rem; border-radius:.75rem; font-family:inherit;
            font-size:.95rem; font-weight:700; cursor:pointer; transition:all .2s; border:none; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-primary:hover { background:#2563eb; transform:translateY(-1px); }
        .btn-ghost { background:rgba(255,255,255,.06); color:var(--muted); border:1px solid var(--border); }
        .btn-ghost:hover { color:var(--text); }
        .btn-success { background:var(--success); color:#fff; }

        /* Summary */
        .summary-row { display:flex; justify-content:space-between; padding:.75rem 0;
            border-bottom:1px dashed var(--border); font-size:.9rem; }
        .summary-row:last-child { border:none; }
        .summary-label { color:var(--muted); }
        .summary-value { font-weight:700; }

        /* Done */
        .done-screen { text-align:center; padding:1rem 0; }
        .done-screen .check { font-size:4rem; margin-bottom:1rem;
            background:rgba(16,185,129,.15); width:90px; height:90px;
            display:flex; align-items:center; justify-content:center;
            border-radius:50%; margin:0 auto 1.25rem; border:2px solid rgba(16,185,129,.3); }
        .info-tag { display:inline-block; background:rgba(59,130,246,.1); color:var(--primary);
            border:1px solid rgba(59,130,246,.2); padding:.3rem .9rem; border-radius:999px;
            font-size:.8rem; font-weight:700; margin:.3rem; }
    </style>
</head>
<body>
<div class="container">

    <!-- Progress -->
    <div class="progress-bar">
        <div class="step-dot active" id="dot-0"></div>
        <div class="step-dot" id="dot-1"></div>
        <div class="step-dot" id="dot-2"></div>
        <div class="step-dot" id="dot-3"></div>
        <div class="step-dot" id="dot-4"></div>
        <div class="step-dot" id="dot-5"></div>
    </div>

    <div class="wizard-card" id="wizard-card">
        <!-- Rendered by JS -->
    </div>
</div>

<script src="../src/services/PermissionService.js"></script>
<script src="../src/services/AIUsageTracker.js"></script>
<script src="../src/models/Organization.js"></script>
<script src="../src/models/TeacherProfile.js"></script>
<script src="../src/services/TenantManager.js"></script>

<script>
const SUBJECTS = ['math','science','arabic','english','physics','chemistry','biology','history','geography','islamic'];
const SUBJECT_LABELS = { math:'رياضيات', science:'علوم', arabic:'اللغة العربية', english:'اللغة الإنجليزية',
    physics:'فيزياء', chemistry:'كيمياء', biology:'أحياء', history:'تاريخ', geography:'جغرافيا', islamic:'تربية إسلامية' };

const state = {
    step: 0,
    org: {},
    admin: {},
    teacher: {},
    features: { aiChat: true, examGenerator: true, ragMode: true, notifications: true }
};

const STEPS = [
    { icon: '🏫', title: 'معلومات المنظمة', sub: 'أدخل اسم وبيانات المدرسة أو الأكاديمية لبدء الإعداد.' },
    { icon: '👨‍💼', title: 'إضافة المدير (الناظر)', sub: 'أنشئ حساب المدير الرئيسي للمنظمة.' },
    { icon: '👨‍🏫', title: 'إضافة أول معلم', sub: 'أضف أول معلم في المنصة وحدد مادته.' },
    { icon: '🤖', title: 'تفعيل مزايا الذكاء الاصطناعي', sub: 'اختر المزايا التي تريد تفعيلها في منظمتك.' },
    { icon: '📋', title: 'مراجعة الإعداد', sub: 'تأكد من البيانات قبل إنشاء الحساب.' },
    { icon: '✅', title: 'تم الإعداد!', sub: '' }
];

function setStep(n) {
    state.step = n;
    // Update dots
    for (let i = 0; i < 6; i++) {
        const d = document.getElementById(`dot-${i}`);
        d.className = 'step-dot' + (i < n ? ' done' : i === n ? ' active' : '');
    }
    renderStep();
}

function renderStep() {
    const s = STEPS[state.step];
    const card = document.getElementById('wizard-card');

    let content = state.step < 5
        ? `<div class="step-icon">${s.icon}</div>
           <div class="step-title">${s.title}</div>
           <div class="step-sub">${s.sub}</div>`
        : '';

    switch (state.step) {
        case 0: content += `
            <div class="form-group">
                <label>اسم المنظمة *</label>
                <input id="org-name" placeholder="مثال: أكاديمية النجاح" value="${state.org.name||''}">
            </div>
            <div class="form-group">
                <label>النوع *</label>
                <select id="org-type">
                    <option value="school"  ${state.org.type==='school'?'selected':''}>مدرسة</option>
                    <option value="academy" ${state.org.type==='academy'?'selected':''}>أكاديمية</option>
                </select>
            </div>
            <div class="form-group">
                <label>العنوان (اختياري)</label>
                <input id="org-address" placeholder="مثال: القاهرة، مصر" value="${state.org.address||''}">
            </div>
            <div class="btn-row"><button class="btn btn-primary" onclick="safeFallbackHandler('step0Next', this)">التالي <i class="fas fa-arrow-left"></i></button></div>`;
            break;

        case 1: content += `
            <div class="form-group">
                <label>الاسم الكامل للمدير *</label>
                <input id="admin-name" placeholder="مثال: أحمد السيد" value="${state.admin.fullName||''}">
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني *</label>
                <input id="admin-email" type="email" placeholder="admin@school.com" value="${state.admin.email||''}">
            </div>
            <div class="form-group">
                <label>كلمة المرور *</label>
                <input id="admin-pass" type="password" placeholder="8 أحرف على الأقل">
            </div>
            <div class="btn-row">
                <button class="btn btn-ghost" onclick="setStep(0)"><i class="fas fa-arrow-right"></i> السابق</button>
                <button class="btn btn-primary" onclick="safeFallbackHandler('step1Next', this)">التالي <i class="fas fa-arrow-left"></i></button>
            </div>`;
            break;

        case 2: content += `
            <div class="form-group">
                <label>اسم المعلم *</label>
                <input id="t-name" placeholder="مثال: سارة علي" value="${state.teacher.fullName||''}">
            </div>
            <div class="form-group">
                <label>المادة *</label>
                <select id="t-subject">
                    ${SUBJECTS.map(s => `<option value="${s}" ${state.teacher.subject===s?'selected':''}>${SUBJECT_LABELS[s]}</option>`).join('')}
                </select>
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني (اختياري)</label>
                <input id="t-email" placeholder="teacher@school.com" value="${state.teacher.email||''}">
            </div>
            <div class="btn-row">
                <button class="btn btn-ghost" onclick="setStep(1)"><i class="fas fa-arrow-right"></i> السابق</button>
                <button class="btn btn-primary" onclick="safeFallbackHandler('step2Next', this)">التالي <i class="fas fa-arrow-left"></i></button>
            </div>`;
            break;

        case 3:
            const featureDefs = [
                { key:'aiChat',        icon:'fa-comment-dots', label:'المحادثة الذكية' },
                { key:'examGenerator', icon:'fa-file-alt',     label:'توليد الاختبارات' },
                { key:'ragMode',       icon:'fa-book-open',    label:'وضع الكتاب الذكي' },
                { key:'notifications', icon:'fa-bell',         label:'الإشعارات الذكية' }
            ];
            content += `<div class="feature-grid">
                ${featureDefs.map(f => `
                    <div class="feature-toggle ${state.features[f.key]?'on':''}" id="ft-${f.key}" onclick="toggleFeature('${f.key}')">
                        <i class="fas ${f.icon}" style="color:${state.features[f.key]?'#3b82f6':'#94a3b8'}"></i>
                        <span>${f.label}</span>
                    </div>`).join('')}
            </div>
            <div class="btn-row">
                <button class="btn btn-ghost" onclick="setStep(2)"><i class="fas fa-arrow-right"></i> السابق</button>
                <button class="btn btn-primary" onclick="setStep(4)">التالي <i class="fas fa-arrow-left"></i></button>
            </div>`;
            break;

        case 4:
            const featureList = Object.entries(state.features).filter(([,v])=>v).map(([k])=>k).join('، ');
            content += `
            <div class="summary-row"><span class="summary-label">المنظمة</span><span class="summary-value">${state.org.name} (${state.org.type==='school'?'مدرسة':'أكاديمية'})</span></div>
            <div class="summary-row"><span class="summary-label">المدير</span><span class="summary-value">${state.admin.fullName}</span></div>
            <div class="summary-row"><span class="summary-label">المعلم الأول</span><span class="summary-value">${state.teacher.fullName} — ${SUBJECT_LABELS[state.teacher.subject]}</span></div>
            <div class="summary-row"><span class="summary-label">المزايا المفعّلة</span><span class="summary-value" style="color:var(--success)">${featureList}</span></div>
            <div class="btn-row">
                <button class="btn btn-ghost" onclick="setStep(3)"><i class="fas fa-arrow-right"></i> السابق</button>
                <button class="btn btn-success" onclick="safeFallbackHandler('finishSetup', this)"><i class="fas fa-check"></i> إنشاء الحساب</button>
            </div>`;
            break;

        case 5:
            const t = window._createdTenant;
            content = `<div class="done-screen">
                <div class="check"><i class="fas fa-check" style="color:#10b981; font-size:2rem;"></i></div>
                <h2 style="font-size:1.5rem; font-weight:800; margin-bottom:.5rem;">تم إنشاء الحساب بنجاح!</h2>
                <p style="color:var(--muted); margin-bottom:1.5rem;">منظمتك الآن جاهزة على منصة نيومي.</p>
                ${t ? `<div style="background:rgba(255,255,255,.04); border-radius:.75rem; padding:1.25rem; text-align:right; margin-bottom:1.5rem;">
                    <div class="summary-row" style="padding:.5rem 0;"><span class="summary-label">معرّف المنظمة</span><span class="summary-value" style="font-family:monospace; font-size:.8rem; color:var(--primary);">${t.organizationId}</span></div>
                    <div class="summary-row" style="padding:.5rem 0;"><span class="summary-label">المنظمة</span><span class="summary-value">${t.name}</span></div>
                </div>` : ''}
                <div>
                    <span class="info-tag"><i class="fas fa-robot"></i> AI مفعّل</span>
                    <span class="info-tag"><i class="fas fa-shield-alt"></i> عزل بيانات كامل</span>
                    <span class="info-tag"><i class="fas fa-bell"></i> إشعارات جاهزة</span>
                </div>
                <div class="btn-row" style="margin-top:1.5rem;">
                    <button class="btn btn-primary" onclick="window.location='investor-dashboard.html'">
                        <i class="fas fa-chart-bar"></i> عرض لوحة التحليلات
                    </button>
                </div>
            </div>`;
            break;
    }

    card.innerHTML = content;
}

function toggleFeature(key) {
    state.features[key] = !state.features[key];
    renderStep();
}

function step0Next() {
    const name = document.getElementById('org-name').value.trim();
    if (!name) return alert('يرجى إدخال اسم المنظمة');
    state.org = { name, type: document.getElementById('org-type').value, address: document.getElementById('org-address').value.trim() };
    setStep(1);
}
function step1Next() {
    const fullName = document.getElementById('admin-name').value.trim();
    const email = document.getElementById('admin-email').value.trim();
    if (!fullName || !email) return alert('يرجى إدخال الاسم والبريد الإلكتروني');
    state.admin = { fullName, email };
    setStep(2);
}
function step2Next() {
    const fullName = document.getElementById('t-name').value.trim();
    if (!fullName) return alert('يرجى إدخال اسم المعلم');
    state.teacher = { fullName, subject: document.getElementById('t-subject').value, email: document.getElementById('t-email').value.trim() };
    setStep(3);
}

function finishSetup() {
    try {
        const adminId = `admin_${Date.now()}`;
        const tenant = TenantManager.createTenant({
            name: state.org.name,
            type: state.org.type,
            adminId,
            address: state.org.address,
            features: state.features
        });

        const teacher = TeacherProfileManager.createTeacherProfile({
            fullName: state.teacher.fullName,
            subject: state.teacher.subject,
            email: state.teacher.email,
            academyId: tenant.organizationId
        });

        TenantManager.assignUserToOrganization(teacher.id, tenant.organizationId);

        window._createdTenant = tenant.toJSON();
        setStep(5);
    } catch (e) {
        alert('حدث خطأ: ' + e.message);
    }
}

// Init
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(renderStep, 100);
});
</script>
</body>
</html>
